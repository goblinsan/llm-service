server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Proxy the wrapper API and inference endpoints
    location /health {
        proxy_pass http://llm-service:8080/health;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/ {
        proxy_pass http://llm-service:8080/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        # Support long-running model downloads and loads
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    location /v1/ {
        proxy_pass http://llm-service:8080/v1/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        # Support streaming SSE responses
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        # Use HTTP/1.1 and clear the Connection header so nginx does not
        # close the upstream connection between SSE chunks (keep-alive passthrough)
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    # Serve the React SPA; fall back to index.html for client-side routing
    location / {
        try_files $uri $uri/ /index.html;
    }
}
