services:
  llm-service:
    build: ./wrapper
    restart: unless-stopped
    ports:
      - "${HOST_PORT:-5301}:8080"
    volumes:
      - /data/models:/data/models
      - /data/llm:/data/llm
    environment:
      MODEL_PATH: ${MODEL_PATH:-/data/models/llm/model.gguf}
      MODELS_DIR: /data/models/llm
      N_GPU_LAYERS: ${N_GPU_LAYERS:--1}
      CTX_SIZE: ${CTX_SIZE:-4096}
      ADMIN_TOKEN: ${ADMIN_TOKEN:-}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
