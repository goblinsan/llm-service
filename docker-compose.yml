services:
  llama-server:
    image: ghcr.io/ggerganov/llama.cpp:server-cuda
    restart: unless-stopped
    ports:
      - "${HOST_PORT:-5301}:8080"
    volumes:
      - /data/models:/data/models:ro
      - /data/llm:/data/llm
    command: >
      --model ${MODEL_PATH:-/data/models/llm/model.gguf}
      --n-gpu-layers ${N_GPU_LAYERS:--1}
      --ctx-size ${CTX_SIZE:-4096}
      --host 0.0.0.0
      --port 8080
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
